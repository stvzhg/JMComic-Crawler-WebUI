<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMComic Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main id="page">

        <h1>JMComic Downloader</h1>

        <!--
            Form submits to /download via GET for no-JS fallback.
            When JavaScript is enabled, app.js intercepts the submit event
            and calls POST /api/download instead.
        -->
        <form id="submissionForm" action="/download" method="get">
            <fieldset>
                <label for="comicId" class="sr-only">Album ID</label>
                <input
                    id="comicId"
                    type="text"
                    name="comicId"
                    placeholder="Enter album ID (e.g. 123456)"
                    required
                    autocomplete="off"
                >
                <button type="submit" id="submitButton">Download</button>
                <button type="button" id="previewButton">Preview</button>
            </fieldset>
        </form>

        <!-- Loading state: shown during download or preview fetch -->
        <div id="loading" class="hidden" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p id="loadingText">Loading, please wait&hellip;</p>
        </div>

        <!-- Preview card: shows album metadata before downloading -->
        <div id="preview" class="hidden">
            <div class="preview-card">
                <img id="previewCover" class="preview-cover" src="" alt="Album cover" />
                <div class="preview-info">
                    <h2 id="previewTitle"></h2>
                    <p id="previewAuthors"></p>
                    <div id="previewTags" class="tag-list"></div>
                    <p id="previewDescription"></p>
                    <div class="preview-stats">
                        <span id="previewViews"></span>
                        <span id="previewLikes"></span>
                        <span id="previewPages"></span>
                        <span id="previewChapters"></span>
                    </div>
                </div>
            </div>
            <div class="preview-actions">
                <button type="button" id="previewDownloadButton">Download</button>
                <button type="button" id="previewCancelButton">Cancel</button>
            </div>
        </div>

        <!-- Result state: shown after download completes -->
        <div id="loading" class="hidden" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p id="loadingText">Downloading, please wait&hellip;</p>
        </div>

        <!-- Result state: shown after download completes -->
        <div id="result" class="hidden" role="alert">
            <p id="resultMessage"></p>
            <button type="button" id="resetButton">Download Another</button>
        </div>

    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
