<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMComic — Success</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main id="page">

        <h1>Download Complete!</h1>

        <div id="submissionForm">
            {% if album_title %}
            <p style="text-align:center;font-size:var(--font-lg);margin-bottom:var(--spacing-md);">
                Album &ldquo;{{ album_title }}&rdquo; ({{ comic_id }}) downloaded successfully.
            </p>
            {% else %}
            <p style="text-align:center;font-size:var(--font-lg);margin-bottom:var(--spacing-md);">
                Download completed successfully.
            </p>
            {% endif %}
            <p style="text-align:center;">
                <a href="/" class="back-link">Download Another</a>
            </p>
        </div>

    </main>
</body>
</html>
