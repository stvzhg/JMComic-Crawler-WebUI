# JMComic Crawler Configuration
# Reference: https://github.com/hect0x7/JMComic-Crawler-Python/blob/master/assets/docs/sources/option_file_syntax.md
#
# Copy config/option.example.yml and edit it to customize your setup.
# Only include keys you want to override; all options have sensible defaults.

# --- Download settings ---
download:
  image:
    # Convert all images to PNG (default: null, no conversion)
    suffix: .png

# --- Directory structure for downloaded files ---
dir_rule:
  # Root download directory
  base_dir: ./data
  # Folder naming pattern: root / album_id - album_title / chapter_title
  # Available variables: Aid, Ptitle, Pindex, Aauthor, Atitle, etc.
  rule: Bd / {Aid}-{Ptitle}
