# =============================================================================
# JMComic Crawler — Full Configuration Reference
# =============================================================================
#
# Copy this file to option.yml and customize it.
# Every key is optional — only include what you want to override.
# Environment variables can be referenced with ${VAR_NAME} syntax.
#
# Docs: https://github.com/hect0x7/JMComic-Crawler-Python/blob/master/assets/docs/sources/option_file_syntax.md
# =============================================================================

# -------------------------------------------------------------------
# Logging — set to false to suppress JMComic log output (default: true)
# -------------------------------------------------------------------
# log: true

# -------------------------------------------------------------------
# Client — HTTP client, domain, retry, and cache settings
# -------------------------------------------------------------------
# client:
#   # Backend client implementation.
#   #   "html" — web scraping (faster, but may be IP-restricted)
#   #   "api"  — APP API (better compatibility, no IP restriction)
#   # Default: auto-selected by the library
#   impl: api
#
#   # Domain list per client type. First domain is tried first; on repeated
#   # failure, fallback domains are used in order.
#   domain:
#     html:
#       - 18comic.vip
#       - 18comic.org
#     api:
#       - www.jmapiproxyxxx.vip
#
#   # Number of retries on request failure (default: 5)
#   retry_times: 5
#
#   # Client-level caching (default: null / disabled)
#   #   true | "level_option"  — same cache across clients from same option
#   #   "level_client"         — each client has its own cache
#   cache: null
#
#   postman:
#     meta_data:
#       # HTTP proxy (default: "system")
#       #   "system"          — use system proxy settings
#       #   null              — no proxy
#       #   "clash" | "v2ray" — common proxy tools
#       #   "127.0.0.1:7890"  — custom proxy address
#       proxies: system
#
#       # Authentication cookies. Only the AVS cookie is typically needed.
#       # Must match the domain being accessed.
#       cookies:
#         AVS: your_cookie_here

# -------------------------------------------------------------------
# Download — image processing, caching, and threading
# -------------------------------------------------------------------
download:
  # Skip download if file already exists on disk (default: true)
  # cache: true

  image:
    # De-obfuscate JM's scrambled images (default: true)
    # decode: true

    # Convert all images to this format.
    #   null    — keep original format
    #   ".jpg"  — convert to JPEG
    #   ".png"  — convert to PNG
    suffix: .png

  # threading:
    # Number of simultaneous image downloads (default: 30, max ~50)
    # image: 30

    # Number of simultaneous chapter downloads (default: CPU thread count)
    # photo: 8

# -------------------------------------------------------------------
# Directory Rule — file/folder structure for downloaded albums
# -------------------------------------------------------------------
dir_rule:
  # Root download directory. Supports ${VAR_NAME} env var references.
  base_dir: ./data

  # Folder naming DSL. Starts with "Bd" (root), uses "/" or "_" as separators.
  #
  # Album properties (Axxx):   Aid, Atitle, Aauthor, Aauthoroname, Aalias_cn,
  #                             Aalias_en, Adistinct_episode, Aidoname
  # Photo/chapter props (Pxxx): Ptitle, Pindex, Pname, Pid
  #
  # Example patterns:
  #   "Bd / Ptitle"                          — root / chapter_title
  #   "Bd_Aid_Pindex"                        — root_albumID_chapterIndex
  #   "Bd / Aauthor / (JM{Aid}-{Pindex})"    — root / author / custom folder
  rule: Bd / {Aid}-{Ptitle}

  # Convert Chinese folder names between simplified and traditional.
  #   null     — no conversion (default)
  #   "zh-cn"  — convert to simplified Chinese
  #   "zh-tw"  — convert to traditional Chinese
  # Requires the optional zhconv library.
  # normalize_zh: null

